<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sueffig & Solide - The Game</title>
    <link rel="stylesheet" href="style.css?v=28" />
  </head>
  <body>
    <main class="game">
      <header class="topbar">
        <div>
          <h1>Sueffig & Solide</h1>
        </div>
        <div class="header-actions desktop-actions">
          <button
            id="helpButton"
            class="text-toggle"
            type="button"
            data-control="help"
            aria-label="Hilfe einschalten"
            aria-pressed="false"
          >
            Hilfe
          </button>
          <button
            id="musicButton"
            class="text-toggle music-toggle"
            type="button"
            data-control="music"
            aria-label="Musik ausschalten"
            aria-pressed="true"
          >
            Musik
          </button>
          <button
            id="restartButton"
            class="icon-button"
            type="button"
            data-control="restart"
            aria-label="Neu starten"
            title="Neu starten"
          >
            ↻
          </button>
        </div>
      </header>

      <section id="stage" class="stage" aria-label="Proberaum">
        <img
          class="room-image"
          src="Hintergrund/Bild3.png"
          alt="Ein enger Proberaum mit Gitarren, Schlagzeug, Verstaerkern, Setlist und vielen Bierflaschen"
        />
        <div class="header-actions stage-actions">
          <button
            class="text-toggle"
            type="button"
            data-control="help"
            aria-label="Hilfe einschalten"
            aria-pressed="false"
          >
            Hilfe
          </button>
          <button
            class="text-toggle music-toggle"
            type="button"
            data-control="music"
            aria-label="Musik ausschalten"
            aria-pressed="true"
          >
            Musik
          </button>
          <button
            class="icon-button"
            type="button"
            data-control="restart"
            aria-label="Neu starten"
            title="Neu starten"
          >
            ↻
          </button>
        </div>
        <div id="messageBox" class="room-message" aria-live="polite">
          <p id="messageText"></p>
        </div>
        <div id="localFeedback" class="local-feedback" aria-hidden="true"></div>
        <button id="storyOverlay" class="story-overlay" type="button" aria-label="Story weiter">
          <span id="storyText" class="story-text"></span>
        </button>
        <button id="boardOverlay" class="board-overlay" type="button" aria-label="Tafel schliessen">
          <span class="board-frame">
            <img class="board-image" src="Hintergrund/Tafel.png" alt="Vergroesserte Tafel mit Songideen" />
          </span>
        </button>
        <button id="posterOverlay" class="poster-overlay" type="button" aria-label="Plakat schliessen">
          <span class="poster-frame">
            <img class="poster-image" src="Hintergrund/werbung.jpeg" alt="Vergroessertes Konzertplakat" />
          </span>
        </button>

        <button class="beer beer-1" type="button" data-beer="good" aria-label="Bierflasche nehmen"></button>
        <button class="beer beer-2" type="button" data-beer="bad" aria-label="Bierflasche nehmen"></button>
        <button class="beer beer-3" type="button" data-beer="bad" aria-label="Bierflasche nehmen"></button>
        <button class="beer beer-4" type="button" data-beer="bad" aria-label="Bierflasche nehmen"></button>
        <button class="beer beer-5" type="button" data-beer="good" aria-label="Bierflasche nehmen"></button>
        <button class="beer beer-6" type="button" data-beer="bad" aria-label="Bierflasche nehmen"></button>
        <button class="beer beer-7" type="button" data-beer="good" aria-label="Bierflasche nehmen"></button>
        <button class="beer beer-8" type="button" data-beer="good" aria-label="Bierflasche nehmen"></button>
        <button class="beer beer-9" type="button" data-beer="good" aria-label="Bierflasche nehmen"></button>
        <button class="beer beer-10" type="button" data-beer="bad" aria-label="Bierflasche nehmen"></button>
        <button class="beer beer-11" type="button" data-beer="bad" aria-label="Bierflasche nehmen"></button>
        <button class="beer beer-12" type="button" data-beer="bad" aria-label="Bierflasche nehmen"></button>

        <button class="hotspot hotspot-board" type="button" data-action="board" aria-label="Setlist ansehen">
          <span>Setlist</span>
        </button>
        <button class="hotspot hotspot-guitar" type="button" data-action="guitar" aria-label="Gitarre nehmen">
          <span>Gitarre</span>
        </button>
        <button class="hotspot hotspot-pedals" type="button" data-action="pedals" aria-label="Pedale untersuchen">
          <span>Pedale</span>
        </button>
        <button class="hotspot hotspot-drums" type="button" data-action="drums" aria-label="Schlagzeug testen">
          <span>Drums</span>
        </button>
        <button class="hotspot hotspot-poster" type="button" data-action="poster" aria-label="Poster ansehen">
          <span>Poster</span>
        </button>
        <button class="hotspot hotspot-amp" type="button" data-action="amp" aria-label="Verstaerker einschalten">
          <span>Amp</span>
        </button>
        <button class="hotspot hotspot-notebook" type="button" data-action="notebook" aria-label="Song schreiben">
          <span>Song</span>
        </button>

        <section class="song-progress" aria-label="Song Fortschritt">
          <h2>Mach nen Hit.</h2>
          <ul class="song-steps">
            <li class="song-step" data-song-part="drums">
              <span class="song-check" aria-hidden="true"></span>
              <span>Drums</span>
            </li>
            <li class="song-step" data-song-part="bass">
              <span class="song-check" aria-hidden="true"></span>
              <span>Bass</span>
            </li>
            <li class="song-step" data-song-part="guitar-rhythm">
              <span class="song-check" aria-hidden="true"></span>
              <span>Guitar Rhythm</span>
            </li>
            <li class="song-step" data-song-part="guitar-lead">
              <span class="song-check" aria-hidden="true"></span>
              <span>Guitar Lead</span>
            </li>
            <li class="song-step" data-song-part="voice">
              <span class="song-check" aria-hidden="true"></span>
              <span>Voice</span>
            </li>
          </ul>
        </section>
      </section>
    </main>

    <audio id="backgroundMusic" src="Hintergrundmusik/Atzenklo.mp3" preload="none" loop></audio>
    <script src="script.js?v=20"></script>
  </body>
</html>
